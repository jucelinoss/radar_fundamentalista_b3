# GitHub Actions: Daily B3 Data Pipeline + GitHub Pages Deploy
#
# Runs the complete data pipeline (ingestion + dashboard generation)
# every weekday at 8:00 AM BRT (11:00 UTC).
#
# The generated dashboard is deployed to GitHub Pages automatically.
# Access: https://SEU_USUARIO.github.io/investor/
#
# Required secrets (Settings > Secrets and variables > Actions):
#   BRAPI_TOKEN: seu token do brapi.dev (https://brapi.dev/dashboard)
#   (opcional - sem token usa yfinance como fallback)

name: Daily B3 Pipeline

on:
  schedule:
    - cron: '0 11 * * 1-5'   # 08:00 BRT, dias úteis
  workflow_dispatch:          # Permite executar manualmente

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pipeline:
    name: Data Ingestion + Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest src/tests/ -v --tb=short

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Restore database cache
        id: db-cache
        id: db-cache
        uses: actions/cache@v4
        with:
          path: data/investments.db
          key: b3-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            b3-db-${{ github.ref_name }}-
            b3-db-

      - name: Run full pipeline (incremental)
        run: python src/pipeline.py --max-age-hours 24
        env:
          PYTHONUNBUFFERED: 1
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN || '' }}

      - name: Export to CSV/JSON (for AI analysis)
        run: python src/pipeline.py --export-all
        env:
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN || '' }}

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          # Dashboard
          cp dashboard.html _site/
          # PWA assets
          cp manifest.json _site/ 2>/dev/null || true
          cp service-worker.js _site/ 2>/dev/null || true
          cp -r icons _site/ 2>/dev/null || true
          # Export files
          cp data/export_*.csv data/export_*.json _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Summary
        run: |
          echo "## ✅ Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Duration: pipeline completed" >> $GITHUB_STEP_SUMMARY
          if ls data/failed_tickers.log 2>/dev/null; then
            echo "### ❌ Failed Tickers" >> $GITHUB_STEP_SUMMARY
            cat data/failed_tickers.log >> $GITHUB_STEP_SUMMARY || true
          else
            echo "- All tickers ingested successfully ✅" >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    name: Deploy to GitHub Pages
    needs: pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
