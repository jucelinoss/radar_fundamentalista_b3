# GitHub Actions: Daily B3 Data Pipeline + GitHub Pages Deploy
#
# Runs the complete data pipeline (ingestion + dashboard generation)
# every weekday at 8:00 AM BRT (11:00 UTC).
#
# The generated dashboard is deployed to GitHub Pages automatically,
# but ONLY when the data actually changes (avoids unnecessary deployments).
# Configure GitHub Pages once to deploy from the `gh-pages` branch, `/` folder.
# The workflow preserves `gh-pages/dev/` for previews and uses the branch root
# for the production version from `main`.
#
# Required secrets (Settings > Secrets and variables > Actions):
#   BRAPI_TOKEN: seu token do brapi.dev (https://brapi.dev/dashboard)
#   (opcional - sem token usa yfinance como fallback)
#
# On pipeline failure, a GitHub Issue is automatically created.

name: Daily B3 Pipeline

on:
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 11 * * 1-5'   # 08:00 BRT, dias úteis
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full refresh (ignore cache)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  issues: write               # Para criar issue em caso de falha

concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

jobs:
  pipeline:
    name: Data Ingestion + Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      changed: ${{ steps.check-changes.outputs.changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest src/tests/ -v --tb=short --ignore=src/tests/test_data_ranges.py

      - name: Ensure data directory exists
        run: mkdir -p data

      - name: Restore published Tesouro history
        env:
          PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL }}
        run: |
          base_url="${PAGES_BASE_URL:-https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}}"
          history_url="${base_url%/}/data/tesouro_history.json"
          if curl --fail --location --retry 3 --retry-delay 2 "$history_url" --output data/tesouro_history.json; then
            echo "Tesouro history restored from $history_url"
          elif curl --fail --location --retry 3 --retry-delay 2 "${base_url%/}/data.json" --output /tmp/data.json; then
            if python scripts/bootstrap_tesouro_history.py /tmp/data.json data/tesouro_history.json; then
              echo "Tesouro history bootstrapped from the published data.json"
            else
              echo "Warning: Tesouro history bootstrap failed; starting a new series."
              rm -f data/tesouro_history.json
            fi
          else
            echo "No published Tesouro history found; starting a new series."
            rm -f data/tesouro_history.json
          fi

      - name: Restore database & CVM cache (keyed on tickers.json hash)
        id: db-cache
        uses: actions/cache@v4
        with:
          path: |
            data/investments.db
            data/fiagro_vpa.json
            data/fii_vpa.json
            data/fiagro_dy.json
            data/fii_dy.json
          key: b3-db-${{ hashFiles('config/tickers.json') }}
          restore-keys: |
            b3-db-
          # Salva sempre — necessário para que CVM files gerados sejam cacheados
          save-always: true

      - name: Run full pipeline (incremental or forced)
        id: pipeline-run
        run: |
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            echo "Forçando refresh completo de todos os tickers"
            python src/pipeline.py --force
          else
            python src/pipeline.py --max-age-hours 24
          fi
        env:
          PYTHONUNBUFFERED: 1
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN || '' }}

      - name: Validate data ranges (post-pipeline quality check)
        id: data-validation
        run: python -m pytest src/tests/test_data_ranges.py -v --tb=short
        env:
          PYTHONUNBUFFERED: 1

      - name: Export to CSV/JSON (for AI analysis)
        id: export
        run: |
          if [[ "${{ github.event.inputs.force }}" == "true" ]]; then
            echo "Exportando dados completos (forçado)"
            python src/pipeline.py --force --export-all
          else
            python src/pipeline.py --export-all
          fi
        env:
          PYTHONUNBUFFERED: 1
          BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN || '' }}

      - name: Check if deployable files changed
        id: check-changes
        run: |
          # Always deploy generated data.json and index.html
          echo "Data generated — deploying to GitHub Pages"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Prepare Pages artifact (only if data changed)
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          # Copia todos os arquivos estáticos públicos. As exclusões evitam
          # publicar código, configurações, caches, segredos e dados locais.
          mkdir -p _site
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.agents/' \
            --exclude '.venv/' \
            --exclude '.pytest_cache/' \
            --exclude '.vite/' \
            --exclude '.vscode/' \
            --exclude '_site/' \
            --exclude 'config/' \
            --exclude 'docs/' \
            --exclude 'logs/' \
            --exclude 'reports/' \
            --exclude 'scripts/' \
            --exclude 'src/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '*.py' \
            --exclude '*.bat' \
            --exclude '*.sh' \
            --exclude '*.md' \
            --exclude '*.toml' \
            --exclude '*.txt' \
            --exclude '*.crt' \
            --exclude '*.key' \
            --exclude 'data/investments.db' \
            --exclude 'data/*.log' \
            --exclude 'data/failed_tickers.log' \
            ./ _site/

          # A versão v2 é a página principal; a clássica fica disponível
          # para comparação em ambos os ambientes.
          cp index.html _site/index-classic.html
          cp index-v2.html _site/index.html
          cp data/export_*.csv data/export_*.json _site/

      - name: Validate Pages data artifact
        if: steps.check-changes.outputs.changed == 'true'
        run: python scripts/validate_pages_artifact.py _site

      - name: Upload static site (only if data changed)
        if: steps.check-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: _site

      - name: Summary
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "- Date: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Duration: pipeline completed" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy triggered: ${{ steps.check-changes.outputs.changed }}" >> $GITHUB_STEP_SUMMARY
          if ls data/failed_tickers.log 2>/dev/null; then
            echo "### Failed Tickers" >> $GITHUB_STEP_SUMMARY
            cat data/failed_tickers.log >> $GITHUB_STEP_SUMMARY || true
          else
            echo "- All tickers ingested successfully" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create failure issue
        if: failure() && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Pipeline falhou em $(date +'%Y-%m-%d %H:%M')" \
            --label "bug" \
            --body "A execução automática do pipeline falhou.

          - **Workflow**: [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - **Branch**: ${{ github.ref_name }}
          - **Data**: $(date)

          Detalhes do erro:
          \`\`\`
          ${{ steps.pipeline-run.outcome == 'failure' && 'Pipeline run step failed' || 'Unknown error' }}
          \`\`\`

          Verifique os logs da execução para mais detalhes."

  publish:
    name: Publish main or dev to GitHub Pages branch
    needs: pipeline
    if: needs.pipeline.result == 'success' && needs.pipeline.outputs.changed == 'true' && (github.ref_name == 'main' || github.ref_name == 'dev')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download static site
        uses: actions/download-artifact@v4
        with:
          name: static-site
          path: static-site

      - name: Update the published branch
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repository_url="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git ls-remote --exit-code --heads "$repository_url" gh-pages; then
            git clone --branch gh-pages --single-branch "$repository_url" published
          else
            git clone --no-checkout "$repository_url" published
            git -C published checkout --orphan gh-pages
            git -C published rm -rf . 2>/dev/null || true
          fi

          if [[ "$TARGET_BRANCH" == "dev" ]]; then
            rm -rf published/dev
            mkdir -p published/dev
            cp -a static-site/. published/dev/
          else
            find published -mindepth 1 -maxdepth 1 ! -name .git ! -name dev -exec rm -rf {} +
            cp -a static-site/. published/
          fi

          touch published/.nojekyll
          git -C published config user.name "github-actions[bot]"
          git -C published config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C published add --all

          if git -C published diff --cached --quiet; then
            echo "No published files changed."
            exit 0
          fi

          git -C published commit -m "Deploy ${TARGET_BRANCH} from ${GITHUB_SHA}"
          git -C published push origin HEAD:gh-pages
